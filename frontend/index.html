<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Primary Meta Tags -->
    <title>Liklet - Web Development, Digital Marketing & Social Media Growth</title>
    <meta
      name="description"
      content="Liklet helps startups and small businesses grow online with conversion-focused websites, SEO, digital marketing, social media campaigns, and video editing services."
    />
    <meta name="author" content="Liklet" />
    <meta
      name="keywords"
      content="Liklet, web development, website design, digital marketing, SEO services, social media marketing, video editing, YouTube editing, small business marketing, startup marketing"
    />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:site_name" content="Liklet" />
    <meta property="og:title" content="Liklet - Web Development, Digital Marketing & Social Media Growth" />
    <meta
      property="og:description"
      content="Grow your business with websites that convert, SEO that attracts buyers, social media that engages, and video content that keeps audiences watching."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://liklet.com/android-chrome-192x192.png" />
    <meta property="og:image:alt" content="Liklet logo" />
    <meta property="og:url" content="https://liklet.com/" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Liklet - Web Development, Digital Marketing & Social Media Growth" />
    <meta
      name="twitter:description"
      content="Liklet helps growing businesses get more leads through websites, SEO, social media marketing, and video editing."
    />
    <meta name="twitter:image" content="https://liklet.com/android-chrome-192x192.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://liklet.com/" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "@id": "https://liklet.com/#organization",
        "name": "Liklet",
        "url": "https://liklet.com/",
        "logo": "https://liklet.com/android-chrome-192x192.png",
        "image": "https://liklet.com/android-chrome-192x192.png",
        "description": "Liklet provides web development, SEO, digital marketing, social media marketing, and video editing services for startups and small businesses.",
        "areaServed": "Worldwide",
        "serviceType": [
          "Web Development",
          "Digital Marketing",
          "SEO Services",
          "Social Media Marketing",
          "Video Editing"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
